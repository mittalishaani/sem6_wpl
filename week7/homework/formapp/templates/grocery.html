<!DOCTYPE html>
<html>
<head>
    <title>Grocery Checklist</title>

    <style>
        table {
            border-style: solid;
            border-width: 2px;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border-style: solid;
            border-width: 1px;
            padding: 8px;
        }
    </style>
</head>

<body>

<h3>Select Item:</h3>

<form method="POST">
    {% csrf_token %}

    {% for item, price in items.items %}
        <input type="checkbox" name="items" value="{{ item }}">
        {{ item }} <br>
    {% endfor %}

    <br>
    <button type="submit">Add Item</button>
</form>

{% if selected_items %}
<table>
    <tr>
        <th>Item Name</th>
        <th>Item Price</th>
    </tr>

    {% for item, price in selected_items.items %}
    <tr>
        <td>{{ item }}</td>
        <td>{{ price }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

</body>
</html>
